name: Build ZIP Project

on:
  push:
    branches:
      - main
      - master

jobs:
  zip-project:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r JobsRanks-Project.zip . \
          -x "*.git*" \
          -x "target/*" \
          -x ".idea/*"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: JobsRanks-Project
          path: JobsRanks-Project.zip
